<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R&J 四人踩台同步工具</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: #0f172a;
      color: white;
    }
    .wrap { max-width: 600px; margin: auto; padding: 20px; }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }
    button { cursor: pointer; }
    .primary { background: #22c55e; }
    .danger { background: #ef4444; }
    .slot {
      border: 1px solid #334155;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
    }
    .btn-group { display: grid; grid-template-columns: repeat(4,1fr); gap:10px; margin-top:15px;}
    .btn-group button { background:#1f2937; color:white;}
    .active { background:#22c55e !important; color:black;}
  </style>
</head>

<body>
<div class="wrap">

<h2>R&J 四人踩台同步工具</h2>

<input id="room" placeholder="房號">
<input id="name" placeholder="你的名字">

<button class="primary" onclick="join()">加入</button>
<button class="danger" onclick="reset()">重置</button>

<div id="status"></div>

<h3>平台</h3>
<div class="btn-group">
  <button onclick="pick(1)">1</button>
  <button onclick="pick(2)">2</button>
  <button onclick="pick(3)">3</button>
  <button onclick="pick(4)">4</button>
</div>

<div id="slots"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getDatabase,
  ref,
  update,
  onValue
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD5QvkwC4O73Slaj4pWYpPAnzcnpGn7l8",
  authDomain: "rj-tool.firebaseapp.com",
  databaseURL: "https://rj-tool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rj-tool",
  storageBucket: "rj-tool.firebasestorage.app",
  messagingSenderId: "330515008066",
  appId: "1:330515008066:web:870b8118832bc7197fbbdb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room = "";
let name = "";
let myId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id", myId);

let roomRef;

window.join = function () {
  room = document.getElementById("room").value;
  name = document.getElementById("name").value;

  roomRef = ref(db, "rooms/" + room);

  onValue(roomRef, snap => {
    let data = snap.val() || {};
    render(data);
  });

  document.getElementById("status").innerText = "已加入房間";
};

window.pick = function (num) {
  let updates = {};
  updates["platforms/" + num] = { name, id: myId };
  update(roomRef, updates);
};

window.reset = function () {
  update(roomRef, {
    platforms: {1:null,2:null,3:null,4:null}
  });
};

function render(data){
  let html = "";
  let platforms = data.platforms || {};

  for(let i=1;i<=4;i++){
    let p = platforms[i];
    html += `<div class="slot">
      平台 ${i}： ${p ? p.name : "空"}
    </div>`;
  }

  document.getElementById("slots").innerHTML = html;
}
</script>

</body>
</html>

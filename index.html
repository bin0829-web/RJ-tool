<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>R&J 十層踩台同步工具</title>
  <style>
    :root {
      --bg: #08142f;
      --panel: #091836;
      --panel-2: #1e2b45;
      --border: #314868;
      --text: #ffffff;
      --muted: #cbd5e1;
      --green: #22c55e;
      --green-text: #031b0b;
      --red: #ef4444;
      --red-text: #ffffff;
      --btn-blue: #3b4b66;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      padding: 8px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .field-row label {
      width: 52px;
      min-width: 52px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .field-row input {
      flex: 1;
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: #111827;
      font-size: 15px;
      outline: none;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .btn-grid + .btn-grid {
      margin-top: 6px;
    }

    button {
      height: 38px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-join {
      background: var(--green);
      color: #111827;
    }

    .btn-copy {
      background: var(--btn-blue);
      color: #fff;
    }

    .btn-leave {
      background: transparent;
      color: #fff;
      border: 1px solid var(--border);
    }

    .btn-reset {
      background: var(--red);
      color: #fff;
    }

    .btn-disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 8px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .hint {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    .floor {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px;
      margin-bottom: 6px;
      background: rgba(3, 10, 26, 0.55);
    }

    .floor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .floor-title {
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .floor-note {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      line-height: 1;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .platform-btn {
      min-height: 52px;
      border-radius: 14px;
      background: #22314c;
      border: 1px solid #42587f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px 2px;
      text-align: center;
      user-select: none;
    }

    .platform-num {
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .platform-name {
      font-size: 10px;
      line-height: 1.1;
      font-weight: 800;
      word-break: break-word;
      max-width: 100%;
    }

    .active {
      background: var(--green) !important;
      color: var(--green-text) !important;
      border-color: #86efac !important;
    }

    .blocked {
      background: var(--red) !important;
      color: var(--red-text) !important;
      border-color: #fca5a5 !important;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .modal-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .modal-cancel {
      background: #334155;
      color: #fff;
    }

    .modal-confirm {
      background: var(--red);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>R&J 十層踩台同步工具</h1>

      <div class="field-row">
        <label for="room">房號：</label>
        <input id="room" placeholder="輸入房號" />
      </div>

      <div class="field-row">
        <label for="name">名稱：</label>
        <input id="name" placeholder="輸入名稱" />
      </div>

      <div class="btn-grid">
        <button class="btn-join" id="joinBtn">加入房間</button>
        <button class="btn-copy" id="copyBtn">複製分享連結</button>
      </div>

      <div class="btn-grid">
        <button class="btn-leave" id="leaveBtn">離開房間</button>
        <button class="btn-reset" id="resetBtn">重置全部樓層</button>
      </div>

      <div id="status" class="status">尚未連線</div>
      <div class="hint">
        綠色：你目前選的位置<br>
        紅色：已被其他人選走<br>
        同一層只會保留你最後選的 1 個平台
      </div>
    </div>

    <div class="card">
      <div id="floors"></div>
    </div>
  </div>

  <div id="confirmModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-title">確認重置</div>
      <div class="modal-text">確定要重置全部樓層嗎？此操作會清空 1 到 10 層所有平台分配。</div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancelBtn">取消</button>
        <button class="modal-confirm" id="modalConfirmBtn">確定重置</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      onValue,
      onDisconnect,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDD5QvkwC4O73Slaj4pWYpPAnzcnpGn7l8",
      authDomain: "rj-tool.firebaseapp.com",
      databaseURL: "https://rj-tool-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "rj-tool",
      storageBucket: "rj-tool.firebasestorage.app",
      messagingSenderId: "330515008066",
      appId: "1:330515008066:web:870b8118832bc7197fbbdb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const FLOOR_COUNT = 10;
    const PLATFORM_COUNT = 4;

    const roomInput = document.getElementById("room");
    const nameInput = document.getElementById("name");
    const joinBtn = document.getElementById("joinBtn");
    const copyBtn = document.getElementById("copyBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusEl = document.getElementById("status");
    const floorsEl = document.getElementById("floors");
    const confirmModal = document.getElementById("confirmModal");
    const modalCancelBtn = document.getElementById("modalCancelBtn");
    const modalConfirmBtn = document.getElementById("modalConfirmBtn");

    const myId = localStorage.getItem("rj_tool_device_id") || crypto.randomUUID();
    localStorage.setItem("rj_tool_device_id", myId);

    let roomCode = "";
    let myName = "";
    let roomRef = null;
    let roomState = buildEmptyRoomState();
    let unsubscribeRoom = null;

    const qs = new URLSearchParams(location.search);
    if (qs.get("room")) roomInput.value = qs.get("room");
    if (localStorage.getItem("rj_tool_name")) nameInput.value = localStorage.getItem("rj_tool_name");

    joinBtn.addEventListener("click", joinRoom);
    copyBtn.addEventListener("click", copyLink);
    leaveBtn.addEventListener("click", leaveRoom);
    resetBtn.addEventListener("click", openResetConfirm);
    modalCancelBtn.addEventListener("click", closeResetConfirm);
    modalConfirmBtn.addEventListener("click", confirmResetAllFloors);
    confirmModal.addEventListener("click", (e) => {
      if (e.target === confirmModal) closeResetConfirm();
    });

    render();

    async function joinRoom() {
      roomCode = normalizeRoom(roomInput.value);
      myName = nameInput.value.trim();

      if (!roomCode) {
        setStatus("請先輸入房號");
        return;
      }

      if (!myName) {
        setStatus("請先輸入名稱");
        return;
      }

      localStorage.setItem("rj_tool_name", myName);
      history.replaceState({}, "", `${location.pathname}?room=${encodeURIComponent(roomCode)}`);

      roomRef = ref(db, `rooms/${roomCode}`);

      const snap = await get(roomRef);
      const data = snap.val() || buildEmptyRoomState();

      await update(roomRef, {
        floors: data.floors || buildEmptyFloors(),
        players: {
          ...(data.players || {}),
          [myId]: {
            name: myName,
            joinedAt: Date.now()
          }
        }
      });

      await runTransaction(ref(db, `rooms/${roomCode}/hostId`), (current) => current || myId);

      await setupDisconnectCleanup();

      if (unsubscribeRoom) {
        unsubscribeRoom();
      }

      unsubscribeRoom = onValue(roomRef, async (snap) => {
        roomState = snap.val() || buildEmptyRoomState();

        const players = roomState.players || {};
        const currentHostId = roomState.hostId || "";

        if (currentHostId && !players[currentHostId]) {
          const nextHostId = Object.keys(players).sort()[0] || null;
          await update(roomRef, { hostId: nextHostId });
          return;
        }

        render();
      });

      setStatus("已連線");
    }

    async function setupDisconnectCleanup() {
      if (!roomCode) return;

      await onDisconnect(ref(db, `rooms/${roomCode}/players/${myId}`)).remove();

      for (let floor = 1; floor <= FLOOR_COUNT; floor++) {
        for (let platform = 1; platform <= PLATFORM_COUNT; platform++) {
          const slotRef = ref(db, `rooms/${roomCode}/floors/${floor}/${platform}`);
          const slotSnap = await get(slotRef);
          const slotValue = slotSnap.val();
          if (slotValue && slotValue.id === myId) {
            await onDisconnect(slotRef).remove();
          }
        }
      }

      const hostIdSnap = await get(ref(db, `rooms/${roomCode}/hostId`));
      if (hostIdSnap.val() === myId) {
        await onDisconnect(ref(db, `rooms/${roomCode}/hostId`)).remove();
      }
    }

    async function pick(floor, platform) {
      if (!roomRef) {
        setStatus("請先加入房間");
        return;
      }

      const currentSlot = roomState.floors?.[floor]?.[platform];
      if (currentSlot && currentSlot.id !== myId) return;

      const updates = {};

      for (let i = 1; i <= PLATFORM_COUNT; i++) {
        const slot = roomState.floors?.[floor]?.[i];
        if (slot?.id === myId) {
          updates[`floors/${floor}/${i}`] = null;
        }
      }

      updates[`floors/${floor}/${platform}`] = {
        id: myId,
        name: myName
      };

      await update(roomRef, updates);

      const pickedRef = ref(db, `rooms/${roomCode}/floors/${floor}/${platform}`);
      await onDisconnect(pickedRef).remove();
    }

    function openResetConfirm() {
      if (!roomRef) {
        setStatus("請先加入房間");
        return;
      }

      if (!isHost()) {
        setStatus("只有房主可以重置全部樓層");
        return;
      }

      confirmModal.classList.add("show");
    }

    function closeResetConfirm() {
      confirmModal.classList.remove("show");
    }

    async function confirmResetAllFloors() {
      closeResetConfirm();

      if (!roomRef) {
        setStatus("請先加入房間");
        return;
      }

      if (!isHost()) {
        setStatus("只有房主可以重置全部樓層");
        return;
      }

      await update(roomRef, {
        floors: buildEmptyFloors()
      });

      setStatus("已重置全部樓層");
    }

    async function leaveRoom() {
      if (!roomRef || !roomCode) {
        setStatus("目前沒有加入房間");
        return;
      }

      const updates = {
        [`players/${myId}`]: null
      };

      for (let floor = 1; floor <= FLOOR_COUNT; floor++) {
        for (let platform = 1; platform <= PLATFORM_COUNT; platform++) {
          const slot = roomState.floors?.[floor]?.[platform];
          if (slot?.id === myId) {
            updates[`floors/${floor}/${platform}`] = null;
          }
        }
      }

      if (roomState.hostId === myId) {
        const remainingIds = Object.keys(roomState.players || {}).filter(id => id !== myId).sort();
        updates["hostId"] = remainingIds[0] || null;
      }

      await update(roomRef, updates);

      if (unsubscribeRoom) {
        unsubscribeRoom();
        unsubscribeRoom = null;
      }

      roomCode = "";
      roomRef = null;
      roomState = buildEmptyRoomState();
      render();
      setStatus("已離開房間");
    }

    async function copyLink() {
      const code = normalizeRoom(roomInput.value);
      if (!code) {
        setStatus("先輸入房號才能複製");
        return;
      }

      const url = `${location.origin}${location.pathname}?room=${encodeURIComponent(code)}`;
      await navigator.clipboard.writeText(url);
      setStatus("分享連結已複製");
    }

    function render() {
      renderStatus();
      renderResetButton();
      renderFloors();
    }

    function renderStatus() {
      if (!roomCode && !Object.keys(roomState.players || {}).length) {
        statusEl.textContent = "尚未連線";
        return;
      }

      const players = roomState.players || {};
      const hostId = roomState.hostId || "";
      const names = Object.entries(players).map(([id, player]) => {
        const n = player?.name || "未命名";
        return id === hostId ? `${n}（房主）` : n;
      });

      statusEl.textContent = names.length ? `已連線：${names.join("、")}` : "尚未連線";
    }

    function renderResetButton() {
      if (!roomRef) {
        resetBtn.classList.add("btn-disabled");
        resetBtn.textContent = "重置全部樓層";
        return;
      }

      if (isHost()) {
        resetBtn.classList.remove("btn-disabled");
        resetBtn.textContent = "重置全部樓層";
      } else {
        resetBtn.classList.add("btn-disabled");
        resetBtn.textContent = "僅房主可重置";
      }
    }

    function renderFloors() {
      const floors = roomState.floors || buildEmptyFloors();
      let html = "";

      for (let floor = 1; floor <= FLOOR_COUNT; floor++) {
        const myPlatform = getMyPlatformInFloor(floor);

        html += `
          <div class="floor">
            <div class="floor-head">
              <div class="floor-title">第 ${floor} 層</div>
              <div class="floor-note">${myPlatform ? `你選 ${myPlatform}` : "未選"}</div>
            </div>
            <div class="platform-grid">
        `;

        for (let platform = 1; platform <= PLATFORM_COUNT; platform++) {
          const item = floors?.[floor]?.[platform];
          const isMe = item?.id === myId;
          const blocked = item && item.id !== myId;

          html += `
            <div
              class="platform-btn ${isMe ? "active" : ""} ${blocked ? "blocked" : ""}"
              data-floor="${floor}"
              data-platform="${platform}"
            >
              <div class="platform-num">${platform}</div>
              <div class="platform-name">${item ? item.name : ""}</div>
            </div>
          `;
        }

        html += `
            </div>
          </div>
        `;
      }

      floorsEl.innerHTML = html;

      floorsEl.querySelectorAll(".platform-btn").forEach((el) => {
        const floor = Number(el.dataset.floor);
        const platform = Number(el.dataset.platform);
        const slot = roomState.floors?.[floor]?.[platform];
        const blocked = slot && slot.id !== myId;

        if (!blocked) {
          el.addEventListener("click", () => pick(floor, platform));
        }
      });
    }

    function getMyPlatformInFloor(floor) {
      for (let platform = 1; platform <= PLATFORM_COUNT; platform++) {
        const slot = roomState.floors?.[floor]?.[platform];
        if (slot?.id === myId) return platform;
      }
      return "";
    }

    function isHost() {
      return roomState.hostId === myId;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function normalizeRoom(value) {
      return (value || "")
        .trim()
        .toUpperCase()
        .replace(/[^A-Z0-9-_]/g, "")
        .slice(0, 24);
    }

    function buildEmptyFloors() {
      const floors = {};
      for (let f = 1; f <= FLOOR_COUNT; f++) {
        floors[f] = {};
        for (let p = 1; p <= PLATFORM_COUNT; p++) {
          floors[f][p] = null;
        }
      }
      return floors;
    }

    function buildEmptyRoomState() {
      return {
        hostId: null,
        players: {},
        floors: buildEmptyFloors()
      };
    }
  </script>
</body>
</html>

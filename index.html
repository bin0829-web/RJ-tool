<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&J 十層踩台同步工具</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f172a;
  color: white;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button { cursor: pointer; }

.primary { background: #22c55e; color: black; }
.danger { background: #ef4444; }

.status {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #1f2937;
}

.floor {
  margin-top: 15px;
  padding: 12px;
  border: 1px solid #334155;
  border-radius: 12px;
}

.platform-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 🔥 永遠一排 */
  gap: 8px;
  margin-top: 10px;
}

.platform-btn {
  padding: 12px 5px;
  border-radius: 10px;
  background: #1f2937;
  border: 1px solid #334155;
  text-align: center;
  font-weight: bold;
}

.active {
  background: #22c55e !important;
  color: black;
}

.blocked {
  background: #444;
  color: #aaa;
}
</style>
</head>

<body>
<div class="wrap">

<h2>R&J 十層踩台同步工具</h2>

<input id="room" placeholder="房號">
<input id="name" placeholder="你的名字">

<button class="primary" onclick="join()">加入房間</button>
<button class="danger" onclick="resetAll()">重置全部樓層</button>

<div id="status" class="status">尚未連線</div>

<div id="floors"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getDatabase,
  ref,
  get,
  update,
  onValue
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDD5QvkwC4O73Slaj4pWYpPAnzcnpGn7l8",
  authDomain: "rj-tool.firebaseapp.com",
  databaseURL: "https://rj-tool-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rj-tool",
  storageBucket: "rj-tool.firebasestorage.app",
  messagingSenderId: "330515008066",
  appId: "1:330515008066:web:870b8118832bc7197fbbdb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomRef;
let myId = localStorage.getItem("id") || crypto.randomUUID();
localStorage.setItem("id", myId);

let state = {};
let name = "";

window.join = async function () {
  const room = document.getElementById("room").value;
  name = document.getElementById("name").value;

  if (!room || !name) return;

  roomRef = ref(db, "rooms/" + room);

  const snap = await get(roomRef);
  const data = snap.val() || { floors: buildEmpty() };

  await update(roomRef, {
    floors: data.floors || buildEmpty()
  });

  onValue(roomRef, (snap) => {
    state = snap.val() || {};
    render();
  });

  document.getElementById("status").innerText = "已連線";
};

window.pick = function (floor, platform) {
  const updates = {};

  // 清掉該層自己的舊位置
  for (let i = 1; i <= 4; i++) {
    if (state.floors?.[floor]?.[i]?.id === myId) {
      updates[`floors/${floor}/${i}`] = null;
    }
  }

  updates[`floors/${floor}/${platform}`] = {
    name,
    id: myId
  };

  update(roomRef, updates);
};

window.resetAll = function () {
  update(roomRef, {
    floors: buildEmpty()
  });
};

function render() {
  let html = "";
  const floors = state.floors || buildEmpty();

  for (let f = 1; f <= 10; f++) {
    html += `<div class="floor"><b>第 ${f} 層</b><div class="platform-grid">`;

    for (let p = 1; p <= 4; p++) {
      const item = floors?.[f]?.[p];
      const isMe = item?.id === myId;
      const blocked = item && !isMe;

      html += `
        <div 
          class="platform-btn ${isMe ? "active" : ""} ${blocked ? "blocked" : ""}"
          onclick="${blocked ? "" : `pick(${f},${p})`}"
        >
          ${p}<br>${item ? item.name : ""}
        </div>
      `;
    }

    html += "</div></div>";
  }

  document.getElementById("floors").innerHTML = html;
}

function buildEmpty() {
  const obj = {};
  for (let f = 1; f <= 10; f++) {
    obj[f] = {1:null,2:null,3:null,4:null};
  }
  return obj;
}
</script>

</body>
</html>
